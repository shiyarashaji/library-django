<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books | MyLibrary</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(120deg, #1e293b, #020617);
            color: white;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1100px;
            margin: 60px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            background: linear-gradient(45deg,#38bdf8,#818cf8);
            -webkit-background-clip: text;
            color: transparent;
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        .book-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
        }

        .book-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: rgba(255,255,255,0.08);
        }

        .title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #38bdf8;
        }

        .author {
            font-size: 0.9rem;
            color: #cbd5f5;
            margin-bottom: 8px;
        }

        .details {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .book-card:hover .title{
    color:#818cf8;
    transition:0.3s;
}
    .buy-btn{
    margin-top:15px;
    width:100%;
    background:linear-gradient(45deg,#38bdf8,#6366f1);
    color:white;
}

.buy-btn:hover{
    background:linear-gradient(45deg,#0ea5e9,#4f46e5);
}
        .empty {
            text-align: center;
            color: #94a3b8;
        }
        .btn{
            padding:12px 28px;
            border:none;
            border-radius:30px;
            background:linear-gradient(45deg,#38bdf8,#6366f1);
            color:white;
            cursor:pointer;
            font-weight:500;
            transition:0.3s;
            box-shadow:0 0 15px rgba(99,102,241,0.5);
        }

        .btn:hover{
            transform:translateY(-3px);
            box-shadow:0 0 25px rgba(56,189,248,0.7);
        }
    </style>
</head>

<body>

<div class="container">
    <h1>📚 Book Collection</h1>

    <div class="book-grid">
        {% for i in books %}
            <div class="book-card">
                <div class="title">{{ i.title }}</div>
                <div class="author">by {{ i.author }}</div>
                <div class="details">
                    📅 {{ i.published_date }} <br>
                    📄 {{ i.pages }} pages
                </div>
            <a href="{% url 'buy_book' i.id %}">
                <button class="btn buy-btn">
                    Buy Now
                </button>
            </a>
            {% if messages %}
    <div class="message-box">
        {% for message in messages %}
            <p>{{ message }}</p>
        {% endfor %}
    </div>
{% endif %}
            </div>
        {% empty %}
            <p class="empty">No books available.</p>
        {% endfor %}
    </div>

</div>

</body>
</html>
