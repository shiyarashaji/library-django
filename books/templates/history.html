<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Purchase History</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(120deg, #1e293b, #020617);
    color: white;
}

.container {
    max-width: 900px;
    margin: 60px auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 40px;
    background: linear-gradient(45deg,#38bdf8,#818cf8);
    -webkit-background-clip: text;
    color: transparent;
}

.history-card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 15px;
    border: 1px solid rgba(255,255,255,0.1);
}

.time {
    color: #94a3b8;
    font-size: 0.8rem;
}
</style>
</head>

<body>

<div class="container">
    <h1>🛒 Purchase History</h1>

    {% for p in purchases %}
        <div class="history-card">
            <h3>{{ p.book.title }}</h3>
            <p>by {{ p.book.author }}</p>
            <p class="time">Purchased on {{ p.purchased_at }}</p>
        </div>
    {% empty %}
        <p>No purchases yet.</p>
    {% endfor %}
</div>

</body>
</html>
